<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sinyalnya lagi ngambek · ngafe.space</title>
    <style>
        body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; background: #faf8f5; color: #1a1714; font-family: ui-sans-serif, system-ui, sans-serif; text-align: center; }
        .dot { width: 56px; height: 56px; border-radius: 9999px; background: #c4451c; margin: 0 auto 24px; }
        h1 { font-size: 20px; margin: 0 0 8px; }
        p { color: #6b6459; margin: 0 0 24px; line-height: 1.6; }
        button { min-height: 48px; padding: 0 24px; border: 0; border-radius: 12px; background: #c4451c; color: #fff; font-weight: 600; font-size: 15px; cursor: pointer; }
        button:active { background: #9a3412; }
    </style>
</head>
<body>
    <div>
        <div class="dot" aria-hidden="true"></div>
        <h1>Sinyalnya lagi ngambek</h1>
        <p>Halaman ini belum pernah tersimpan buat dibuka offline.<br>Coba lagi sebentar, di'?</p>
        <button type="button" onclick="location.reload()">Coba lagi</button>
    </div>
</body>
</html>

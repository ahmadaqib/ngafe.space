name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: ngafe_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres -d ngafe_test"
          --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with: { php-version: '8.4', extensions: pdo_pgsql }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: composer install --no-interaction --prefer-dist
      - run: npm ci
      - run: composer audit
      - run: php artisan migrate --force
        env: { DB_CONNECTION: pgsql, DB_HOST: 127.0.0.1, DB_PORT: 5432, DB_DATABASE: ngafe_test, DB_USERNAME: postgres, DB_PASSWORD: postgres }
      - run: php artisan test
      - run: npm run build
